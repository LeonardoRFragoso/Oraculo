[pytest]
# Configuração do pytest para GPTRACKER

# Diretórios de teste
testpaths = tests

# Padrões de arquivos de teste
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Opções padrão
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes
    --maxfail=5

# Markers customizados
markers =
    integration: testes de integração que requerem serviços externos
    unit: testes unitários rápidos
    slow: testes que demoram mais de 1 segundo
    openrag: testes específicos do OpenRAG
    legacy: testes do sistema legado

# Configuração de cobertura
[coverage:run]
source = src
omit = 
    */tests/*
    */venv/*
    */__pycache__/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
